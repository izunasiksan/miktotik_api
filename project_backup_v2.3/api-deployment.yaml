apiVersion: apps/v1
kind: Deployment
metadata:
  name: mikrotik-api
  labels:
    app: mikrotik-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mikrotik-api
  template:
    metadata:
      labels:
        app: mikrotik-api
    spec:
      containers:
      - name: mikrotik-api
        image: mikrotik-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: mikrotik-config
        - secretRef:
            name: mikrotik-secrets
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "0.5"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mikrotik-api-service
spec:
  selector:
    app: mikrotik-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
