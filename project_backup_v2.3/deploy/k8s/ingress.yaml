apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mikrotik-api-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.mikrotik-manager.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mikrotik-api-service
            port:
              number: 80
