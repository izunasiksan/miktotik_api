# DEVELOPMENT ENVIRONMENT CONFIGURATION
version: '3.8'

services:
  db:
    environment:
      - POSTGRES_PASSWORD=dev_root_password
    ports:
      - "5432:5432" # Expose for debugging

  api:
    build:
      context: ../../
      dockerfile: Dockerfile
    environment:
      - DB_PASS=dev_root_password
      - LOG_LEVEL=DEBUG
      - RELOAD=true
    volumes:
      - ../../app:/app/app # Hot reload
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ../../
      dockerfile: Dockerfile
    environment:
      - DB_PASS=dev_root_password
      - LOG_LEVEL=DEBUG
    volumes:
      - ../../app:/app/app # Hot reload code

  redis:
    ports:
      - "6379:6379" # Expose for debugging
