name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Services
      run: docker-compose build

    - name: Run Integration Tests
      run: |
        # Create .env for testing
        cp .env.example .env || echo "DB_PASS=root\nTELEGRAM_BOT_TOKEN=test\nAES_SECRET_KEY=test" > .env
        docker-compose up -d
        sleep 10
        docker-compose ps
        # Add curl check or pytest here
        docker-compose down

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
        
    - name: Push Images
      if: github.event_name != 'pull_request'
      run: |
        docker tag mikrotik_api ${{ secrets.DOCKER_HUB_USERNAME }}/mikrotik_api:latest
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/mikrotik_api:latest
        docker tag mikrotik_worker ${{ secrets.DOCKER_HUB_USERNAME }}/mikrotik_worker:latest
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/mikrotik_worker:latest
