apiVersion: apps/v1
kind: Deployment
metadata:
  name: mikrotik-worker
  labels:
    app: mikrotik-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mikrotik-worker
  template:
    metadata:
      labels:
        app: mikrotik-worker
    spec:
      containers:
      - name: mikrotik-worker
        image: mikrotik-api:latest
        command: ["python", "app/worker.py"]
        envFrom:
        - configMapRef:
            name: mikrotik-config
        - secretRef:
            name: mikrotik-secrets
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "0.5"
            memory: "256Mi"
